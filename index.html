<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="description" content="Equipment Register" />
    <title>CS Supplier Hub</title>

    <link rel="preconnect" href="https://www.carlstahl.com" />
    <link rel="preconnect" href="https://script.google.com" />

    <link
      rel="icon"
      type="image/x-icon"
      href="https://www.carlstahl.com/images/favicon.ico"
    />
    <link
      rel="apple-touch-icon"
      href="https://www.carlstahl.com/images/favicon.ico"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f5f5f5;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior: none;
        touch-action: pan-x pan-y;
      }

      body {
        display: flex;
        flex-direction: column;
      }

      /* Iframe wrapper fills the full viewport */
      .iframe-container {
        flex: 1;
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /*
       * Scale trick — no blank bars:
       * The iframe is sized to 133.33% (100/0.80) in width & height
       * so that after transform: scale(0.80) it fills exactly 100%
       * of the viewport. transform-origin: top left anchors it correctly.
       */
      iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: calc(100% / 0.8);
        height: calc(100% / 0.8);
        border: none;
        display: block;
        transform: scale(0.8);
        transform-origin: top left;
      }

      /* Loading indicator */
      .loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: #666;
        z-index: 1;
      }

      .loading-spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #3498db;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 10px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .iframe-loaded .loading {
        display: none;
      }

      @media screen and (max-width: 768px) {
        body {
          position: fixed;
          width: 100vw;
          height: 100vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="iframe-container">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Loading...</p>
      </div>

      <iframe
        id="mainFrame"
        src="https://script.google.com/macros/s/AKfycbxvnV02ek1_JScHpTDp-zn3MZDjWoc03dKOSlw7MMBz3znXahxWfqak8mhhxfKkS8wk/exec"
        loading="eager"
        allow="camera; microphone; geolocation"
        title="CoC Certificate Application Form"
      >
        <p>
          Your browser doesn't support iframes. Please
          <a
            href="https://script.google.com/macros/s/AKfycbxvnV02ek1_JScHpTDp-zn3MZDjWoc03dKOSlw7MMBz3znXahxWfqak8mhhxfKkS8wk/exec"
          >
            click here
          </a>
          to access the form.
        </p>
      </iframe>
    </div>

    <script>
      (function () {
        "use strict";

        const iframe = document.getElementById("mainFrame");
        const container = document.querySelector(".iframe-container");

        iframe.addEventListener("load", function () {
          container.classList.add("iframe-loaded");
        });

        window.addEventListener("orientationchange", function () {
          setTimeout(function () {
            iframe.style.width = "calc(100% / 0.80)";
            iframe.style.height = "calc(100% / 0.80)";
          }, 150);
        });

        let lastTouchEnd = 0;
        document.addEventListener(
          "touchend",
          function (event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
              event.preventDefault();
            }
            lastTouchEnd = now;
          },
          false,
        );

        if ("serviceWorker" in navigator) {
          window.addEventListener("load", function () {
            // navigator.serviceWorker.register('/sw.js');
          });
        }
      })();
    </script>
  </body>
</html>
