<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Supplier Hub" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/x-icon"
      href="https://www.carlstahl.com/images/favicon.ico"
    />
    <link
      rel="shortcut icon"
      href="https://www.carlstahl.com/images/favicon.ico"
      type="image/x-icon"
    />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://script.google.com" />

    <title>Supplier Hub Carl Stahl</title>
    <style>
      /* ========== CSS Variables (Black & Gold Dubai Theme) ========== */
      :root {
        /* Black Colors */
        --primary: #000000;
        --primary-light: #1a1a1a;
        --primary-gradient: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
        --dark-bg: #0a0a0a;

        /* Gold Accent Colors */
        --accent: #d4af37;
        --accent-light: #f4d03f;
        --accent-dark: #b8941e;
        --accent-gradient: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);

        /* Background & Text */
        --bg-dark: #0f0f0f;
        --bg-darker: #050505;
        --bg-white: #ffffff;
        --text-primary: #ffffff;
        --text-secondary: #b0b0b0;
        --text-tertiary: #808080;
        --text-gold: #d4af37;

        /* Borders & Shadows */
        --border-dark: rgba(255, 255, 255, 0.1);
        --border-gold: rgba(212, 175, 55, 0.3);
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
        --shadow-gold: 0 2px 12px rgba(212, 175, 55, 0.3);
        --shadow-glow: 0 0 20px rgba(212, 175, 55, 0.4);

        /* Transitions */
        --transition: 0.2s ease;

        /* Safe Areas */
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
      }

      /* ========== Reset & Base ========== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: var(--bg-dark);
        display: flex;
        flex-direction: column;
        color: var(--text-primary);
      }

      /* ========== Header (Black & Gold) ========== */
      .header {
        background: var(--primary-gradient);
        border-bottom: 2px solid var(--accent);
        padding: 10px 16px;
        padding-top: calc(10px + var(--safe-area-top));
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 100;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
        position: relative;
      }

      .header::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: var(--accent-gradient);
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        min-width: 0;
      }

      .logo {
        width: 36px;
        height: 36px;
        background: var(--accent-gradient);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow: var(--shadow-gold);
      }

      .logo-icon {
        width: 20px;
        height: 20px;
        color: var(--primary);
        font-weight: bold;
      }

      .title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      }

      .location {
        font-size: 11px;
        color: var(--primary);
        padding: 3px 10px;
        background: var(--accent);
        border-radius: 12px;
        white-space: nowrap;
        font-weight: 600;
        box-shadow: var(--shadow-gold);
      }

      .header-right {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }

      .btn-icon {
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(212, 175, 55, 0.1);
        border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 8px;
        cursor: pointer;
        transition: all var(--transition);
        color: var(--accent);
        backdrop-filter: blur(10px);
      }

      .btn-icon:hover {
        background: rgba(212, 175, 55, 0.2);
        border-color: var(--accent);
        box-shadow: var(--shadow-gold);
        transform: translateY(-1px);
      }

      .btn-icon:active {
        transform: scale(0.95);
      }

      .btn-icon svg {
        width: 17px;
        height: 17px;
      }

      .btn-icon.spinning svg {
        animation: spin 0.5s ease;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* ========== Main Content ========== */
      .main {
        flex: 1;
        padding: 6px;
        padding-bottom: calc(6px + var(--safe-area-bottom));
        display: flex;
        overflow: hidden;
      }

      .content {
        flex: 1;
        background: var(--bg-white);
        border: 2px solid var(--border-gold);
        border-radius: 10px;
        overflow: hidden;
        position: relative;
        display: flex;
        box-shadow: var(--shadow-glow);
      }

      .iframe-wrapper {
        flex: 1;
        position: relative;
        background: var(--bg-white);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
        background: var(--bg-white);
      }

      /* ========== Loading (Black & Gold) ========== */
      .loading {
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 50;
        transition:
          opacity 0.3s,
          visibility 0.3s;
      }

      .loading.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .spinner {
        width: 70px;
        height: 70px;
        position: relative;
        margin-bottom: 24px;
      }

      .spinner-ring {
        position: absolute;
        inset: 0;
        border: 3px solid transparent;
        border-radius: 50%;
        animation: rotate 1.2s linear infinite;
      }

      .spinner-ring:nth-child(1) {
        border-top-color: var(--accent);
        border-right-color: var(--accent);
      }

      .spinner-ring:nth-child(2) {
        border-bottom-color: var(--accent-light);
        border-left-color: var(--accent-light);
        animation-duration: 1.5s;
        animation-direction: reverse;
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .spinner-center {
        position: absolute;
        inset: 20px;
        background: var(--accent-gradient);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow-glow);
      }

      .spinner-icon {
        width: 24px;
        height: 24px;
        color: var(--primary);
      }

      .loading-text {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 6px;
      }

      .loading-subtext {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 18px;
      }

      .loading-time {
        font-size: 12px;
        color: var(--accent);
        font-weight: 600;
      }

      /* ========== Error State ========== */
      .error {
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 60;
        padding: 24px;
      }

      .error.visible {
        display: flex;
      }

      .error-icon {
        width: 70px;
        height: 70px;
        background: linear-gradient(
          135deg,
          rgba(239, 68, 68, 0.15) 0%,
          rgba(220, 38, 38, 0.1) 100%
        );
        border: 2px solid rgba(239, 68, 68, 0.3);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 18px;
        font-size: 32px;
      }

      .error-title {
        font-size: 19px;
        font-weight: 700;
        color: #ef4444;
        margin-bottom: 10px;
      }

      .error-message {
        font-size: 14px;
        color: var(--text-secondary);
        text-align: center;
        margin-bottom: 24px;
        max-width: 300px;
        line-height: 1.5;
      }

      .btn {
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all var(--transition);
        border: none;
        background: var(--accent-gradient);
        color: var(--primary);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        box-shadow: var(--shadow-gold);
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-glow);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn svg {
        width: 16px;
        height: 16px;
      }

      /* ========== Toast ========== */
      .toast-container {
        position: fixed;
        top: calc(70px + var(--safe-area-top));
        left: 50%;
        transform: translateX(-50%);
        z-index: 200;
        pointer-events: none;
      }

      .toast {
        background: var(--primary-light);
        border: 1px solid var(--border-gold);
        border-radius: 10px;
        padding: 12px 18px;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: var(--shadow-glow);
        animation: slide-in 0.3s ease;
        pointer-events: all;
        min-width: 220px;
      }

      @keyframes slide-in {
        from {
          opacity: 0;
          transform: translateY(-15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .toast.exit {
        animation: slide-out 0.3s ease forwards;
      }

      @keyframes slide-out {
        to {
          opacity: 0;
          transform: translateY(-15px);
        }
      }

      .toast-icon {
        font-size: 18px;
        color: var(--accent);
      }

      .toast-text {
        font-size: 14px;
        color: var(--text-primary);
        font-weight: 600;
      }

      /* ========== Status Badge ========== */
      .status {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: var(--accent);
        font-weight: 600;
      }

      .status-dot {
        width: 7px;
        height: 7px;
        background: var(--accent);
        border-radius: 50%;
        animation: pulse 2s infinite;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(1.2);
        }
      }

      /* ========== Luxury Pattern Decoration ========== */
      .header::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
      }

      /* ========== Responsive ========== */
      @media (max-width: 480px) {
        .header {
          padding: 8px 12px;
          padding-top: calc(8px + var(--safe-area-top));
        }

        .logo {
          width: 32px;
          height: 32px;
        }

        .logo-icon {
          width: 18px;
          height: 18px;
        }

        .title {
          font-size: 13px;
        }

        .location {
          font-size: 10px;
          padding: 2px 8px;
        }

        .btn-icon {
          width: 30px;
          height: 30px;
        }

        .btn-icon svg {
          width: 15px;
          height: 15px;
        }

        .main {
          padding: 4px;
          padding-bottom: calc(4px + var(--safe-area-bottom));
        }

        .content {
          border-radius: 8px;
        }

        .spinner {
          width: 60px;
          height: 60px;
          margin-bottom: 20px;
        }

        .spinner-center {
          inset: 18px;
        }

        .spinner-icon {
          width: 20px;
          height: 20px;
        }
      }

      @media (max-width: 380px) {
        .location {
          display: none;
        }
      }

      @media (orientation: landscape) and (max-height: 500px) {
        .header {
          padding: 6px 12px;
          padding-top: calc(6px + var(--safe-area-top));
        }

        .main {
          padding: 3px;
          padding-bottom: calc(3px + var(--safe-area-bottom));
        }
      }

      /* ========== Accessibility ========== */
      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      .btn-icon:focus-visible,
      .btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      /* ========== Print ========== */
      @media print {
        .header,
        .loading,
        .error {
          display: none !important;
        }

        .main {
          padding: 0;
        }

        .content {
          border: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Black & Gold Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg
            class="logo-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div class="title">Carl Stahl Supplier Management Hub</div>
        <div class="location">Becoming a Registered Supplier</div>
      </div>
      <div class="header-right">
        <button
          class="btn-icon"
          id="refreshBtn"
          aria-label="Refresh"
          title="Refresh"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"
            />
          </svg>
        </button>
        <button
          class="btn-icon"
          id="fullscreenBtn"
          aria-label="Fullscreen"
          title="Fullscreen"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
            />
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <div class="content">
        <div class="iframe-wrapper">
          <!-- Loading Screen -->
          <div class="loading" id="loading">
            <div class="spinner">
              <div class="spinner-ring"></div>
              <div class="spinner-ring"></div>
              <div class="spinner-center">
                <svg
                  class="spinner-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
              </div>
            </div>
            <div class="loading-text">Loading Supply Hub System</div>
            <div class="loading-subtext">Carl Stahl </div>
            <div class="loading-time">
              <span class="status">
                <span class="status-dot"></span>
                <span id="timer">0s</span>
              </span>
            </div>
          </div>

          <!-- Error State -->
          <div class="error" id="error">
            <div class="error-icon">⚠️</div>
            <div class="error-title">Connection Failed</div>
            <div class="error-message">
              Unable to load the supplier management system. Please verify
              your internet connection and try again.
            </div>
            <button class="btn" onclick="reload()">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"
                />
              </svg>
              Retry Connection
            </button>
          </div>

          <!-- Certificate Iframe -->
          <iframe
            id="iframe"
            src="https://script.google.com/macros/s/AKfycbwcsw6cm4BjaTgqgeoTHsHbr1dbFPbKCTX-sFkohkP2P4-o5a5wDdwFd4EXmcyHXcNJ/exec"
            allowfullscreen="true"
            title="Supplier Management System"
          ></iframe>
        </div>
      </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
      // Elements
      const $ = {
        loading: document.getElementById("loading"),
        error: document.getElementById("error"),
        iframe: document.getElementById("iframe"),
        refreshBtn: document.getElementById("refreshBtn"),
        fullscreenBtn: document.getElementById("fullscreenBtn"),
        toastContainer: document.getElementById("toastContainer"),
        timer: document.getElementById("timer"),
      };

      // State
      let loadTimeout;
      let startTime = Date.now();
      let timerInterval;
      let autoFullscreen = false;

      // Timer
      function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
          const elapsed = Math.floor((Date.now() - startTime) / 1000);
          $.timer.textContent = `${elapsed}s`;
        }, 100);
      }

      function stopTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
        }
      }

      // Toast Notifications
      function toast(message, icon = "✓") {
        const div = document.createElement("div");
        div.className = "toast";
        div.innerHTML = `
          <div class="toast-icon">${icon}</div>
          <div class="toast-text">${message}</div>
        `;

        $.toastContainer.appendChild(div);

        setTimeout(() => {
          div.classList.add("exit");
          setTimeout(() => div.remove(), 300);
        }, 3000);
      }

      // Iframe loaded successfully
      $.iframe.addEventListener("load", function () {
        clearTimeout(loadTimeout);
        stopTimer();

        setTimeout(() => {
          $.loading.classList.add("hidden");
          toast("System loaded successfully", "✓");

          // Auto fullscreen on first load
          if (!autoFullscreen) {
            autoFullscreen = true;
            setTimeout(() => {
              if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {
                  console.log("Fullscreen requires user interaction");
                });
              }
            }, 800);
          }
        }, 400);
      });

      // Show error on timeout
      function showError() {
        clearTimeout(loadTimeout);
        stopTimer();
        $.loading.classList.add("hidden");
        $.error.classList.add("visible");
        toast("Connection failed", "⚠️");
      }

      // Set timeout for loading
      loadTimeout = setTimeout(showError, 20000);

      // Reload system
      function reload() {
        $.error.classList.remove("visible");
        $.loading.classList.remove("hidden");
        $.timer.textContent = "0s";

        startTimer();
        loadTimeout = setTimeout(showError, 20000);

        // Force iframe reload
        const src = $.iframe.src;
        $.iframe.src = "";
        setTimeout(() => {
          $.iframe.src = src;
        }, 100);

        toast("Reconnecting to system...", "🔄");
      }

      // Refresh button handler
      $.refreshBtn.addEventListener("click", function () {
        this.classList.add("spinning");
        setTimeout(() => this.classList.remove("spinning"), 500);
        reload();
      });

      // Fullscreen toggle
      $.fullscreenBtn.addEventListener("click", function () {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {
            toast("Fullscreen mode unavailable", "⚠️");
          });
        } else {
          document.exitFullscreen();
        }
      });

      // Update fullscreen button icon
      document.addEventListener("fullscreenchange", function () {
        const svg = $.fullscreenBtn.querySelector("svg");
        if (document.fullscreenElement) {
          svg.innerHTML =
            '<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3" />';
          toast("Fullscreen activated", "⛶");
        } else {
          svg.innerHTML =
            '<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />';
        }
      });

      // Touch event handlers
      let lastTouch = 0;
      document.addEventListener(
        "touchend",
        function (e) {
          const now = Date.now();
          if (now - lastTouch <= 300) {
            e.preventDefault();
          }
          lastTouch = now;
        },
        false,
      );

      // Prevent pull-to-refresh
      let startY = 0;
      document.body.addEventListener(
        "touchstart",
        (e) => {
          startY = e.touches[0].pageY;
        },
        { passive: true },
      );

      document.body.addEventListener(
        "touchmove",
        (e) => {
          const y = e.touches[0].pageY;
          if (
            window.scrollY === 0 &&
            y > startY &&
            !$.iframe.contains(e.target)
          ) {
            e.preventDefault();
          }
        },
        { passive: false },
      );

      // Handle orientation changes
      window.addEventListener("orientationchange", () => {
        setTimeout(() => window.scrollTo(0, 0), 100);
      });

      // Keyboard shortcuts
      document.addEventListener("keydown", (e) => {
        // F5 or Ctrl+R - Refresh
        if (e.key === "F5" || (e.ctrlKey && e.key === "r")) {
          e.preventDefault();
          reload();
        }
        // F11 - Fullscreen
        if (e.key === "F11") {
          e.preventDefault();
          $.fullscreenBtn.click();
        }
      });
